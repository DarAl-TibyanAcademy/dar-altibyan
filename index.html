<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1CB0F6">
  <title>Al-Tibyan | التبيان</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="user-message-toast"></div>

<div id="app-container">
  <div id="screen-map" class="screen active">
    <div class="top-bar">
      <div class="stat-chip">🔥 <span id="streak-count">0</span></div>
      <div class="stat-chip xp">⭐ <span id="total-xp">0</span></div>
      <div style="font-weight:bold; cursor:pointer;" onclick="resetProgress()">⚙️</div>
    </div>
    <div class="map-header">Al-Tibyan Academy</div>
    <div class="lesson-path" id="lesson-path"></div>
    <div class="social-section">
        <h3 class="social-title">Bizga qo'shiling</h3>
        <h4 class="arabic-text" style="font-size: 18px; color: var(--primary-dark); margin-bottom: 15px; text-align: center;">تواصل معنا عبر تليجرام</h4>
        <div class="social-cards-container">
            <div class="social-card">
                <a href="https://t.me/dar_altibyan" target="_blank" class="social-link telegram">Kanalga ulanish</a>
            </div>
            <div class="social-card">
                <a href="https://t.me/Dar_altibyan_admin" target="_blank" class="social-link admin">Adminga yozish</a>
            </div>
        </div>
    </div>
  </div>

  <div id="screen-welcome" class="screen">
    <div class="welcome-icon" id="welcome-icon">👋</div>
    <h2 id="welcome-title" class="mb-2">Dars</h2>
    <h3 id="welcome-title-ar" class="arabic-text mb-2 text-muted" style="text-align: center;">الدَّرْسُ</h3>
    <div class="word-count-badge">📚 Bu darsda <span id="word-count" style="font-size: 20px;">0</span> ta so'z/ibora o'rganasiz</div>
    <div style="text-align: left; width: 100%; font-weight: 800;">Yangi so'zlar va iboralar:</div>
    <div class="vocab-preview" id="vocab-preview"></div>
    <div style="width: 100%; position: sticky; bottom: 0; background: var(--bg); padding-top: 10px;">
        <button class="btn btn-primary" onclick="startLesson()">BOSHLASH</button>
    </div>
  </div>

  <div id="screen-exercise" class="screen">
    <div class="exercise-header">
      <div style="font-size: 24px; cursor: pointer;" onclick="showScreen('map')">✕</div>
      <div class="progress-bg"><div class="progress-fill" id="progress-bar"></div></div>
      <div class="hearts" id="hearts-display">❤️❤️❤️❤️❤️</div>
    </div>
    <div class="exercise-content" id="exercise-content"></div>
    <div class="bottom-bar">
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">TEKSHIRISH</button>
    </div>
    <div class="feedback-sheet" id="feedback-sheet">
      <div class="feedback-content">
        <div id="feedback-msg">To'g'ri!</div>
        <div id="feedback-emoji">✅</div>
      </div>
      <div id="feedback-correct-answer" class="arabic-text" style="display:none; margin-bottom:15px; text-align:center;"></div>
      <button class="btn" id="feedback-btn" onclick="nextQuestion()">DAVOM ETISH</button>
    </div>
  </div>

  <div id="screen-lesson-complete" class="screen" style="justify-content: center; align-items: center; padding: 20px; text-align: center;">
    <div style="font-size: 80px; margin-bottom: 10px;" id="completion-emoji">🥳</div>
    <h2 style="color: var(--success); font-size: 28px; margin-bottom: 5px;">Dars yakunlandi!</h2>
    <p id="completion-msg" style="font-size: 16px; color: var(--text-muted); margin-bottom: 20px;">Mukammal!</p>
    <button class="btn btn-primary" onclick="finishLesson()">DAVOM ETISH</button>
  </div>
</div>

<script src="script.js"></script>
<div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1CB0F6; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; font-family: 'Nunito', sans-serif;">
    <h1 style="font-size: 3rem;">تبيان</h1>
    <p style="font-size: 1.5rem; margin-bottom: 20px;">التعليم التفاعلي</p>
    <button id="start-btn" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; border: none; background: white; color: #1CB0F6; font-weight: bold; cursor: pointer;">ابدأ الآن</button>
</div>
</body>
</html>
